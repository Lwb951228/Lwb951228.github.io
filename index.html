<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wenbo Lu | Academic Homepage</title>
    <meta name="description" content="Academic homepage of Wenbo Lu, transportation engineering researcher.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="home" class="page-shell">
      <aside class="profile-panel" aria-label="Profile">
        <a class="site-title" href="#home"></a>
        <img class="portrait" src="assets/portrait.jpeg" alt="Portrait of Wenbo Lu">
        <h1 data-field="name"></h1>
        <p class="profile-kicker" data-field="altName"></p>
        <p class="profile-title" data-field="title"></p>
        <p class="profile-affiliation" data-field="affiliation"></p>
        <p class="profile-location" data-field="location"></p>
        <nav class="nav" aria-label="Primary navigation"></nav>
        <button class="language-toggle" type="button" aria-label="Switch language"></button>
        <div class="contact-list"></div>
      </aside>

      <div class="content-flow">
        <section class="section-block about-section" aria-labelledby="about-title">
          <h2 id="about-title" data-heading="about"></h2>
          <p class="summary"></p>
        </section>

        <section id="research" class="section-block" aria-labelledby="research-title">
          <h2 id="research-title" data-heading="research"></h2>
          <ul class="research-list"></ul>
        </section>

        <section id="publications" class="section-block split-section" aria-labelledby="publications-title">
          <h2 id="publications-title" data-heading="publications"></h2>
          <div class="publication-years"></div>
        </section>

        <section class="section-block dissertation-block" aria-labelledby="dissertation-title">
          <h2 id="dissertation-title" data-heading="dissertation"></h2>
          <div class="dissertation-card">
            <h3></h3>
            <ul></ul>
          </div>
        </section>

        <section id="experience" class="section-block" aria-labelledby="experience-title">
          <h2 id="experience-title" data-heading="education"></h2>
          <div class="timeline"></div>
        </section>

        <section id="contact" class="section-block closing-section" aria-label="Contact">
          <h2 data-heading="contact"></h2>
          <p class="update-note" data-field="updateNote"></p>
        </section>
      </div>
    </main>

    <script src="content.js"></script>
    <script src="script.js"></script>
  </body>
</html>
